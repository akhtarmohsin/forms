<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forms</title>
  <link rel="icon" type="image/svg+xml" href="/assets/forms/images/forms-mark.svg" />

  {% if vite_dev %}
  <script type="module" src="http://localhost:8083/@vite/client"></script>
  {% else %}
  <link rel="stylesheet" href="/assets/forms/forms/index.css" />
  {% endif %}
</head>
<body>
  <div id="app"></div>

  <script>
    window.csrf_token = {{ csrf_token | tojson }};
    window.frappe = {
      boot: {
        user_info: {
          full_name: {{ full_name | tojson }},
          user_image: {{ user_image | tojson }}
        }
      },
      session: {
        user: {{ session_user | tojson }},
        logged_in: true
      }
    };
  </script>

  {% if vite_dev %}
  <script type="module" src="http://localhost:8083/src/main.js"></script>
  {% else %}
  <script type="module" src="/assets/forms/forms/index.js"></script>
  {% endif %}
</body>
</html>
